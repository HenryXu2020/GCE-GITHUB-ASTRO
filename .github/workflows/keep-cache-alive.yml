name: Keep Cache Alive

on:
  schedule:
    - cron: '0 2 * * 3'   # 每周三凌晨 2:00 (UTC)
    - cron: '0 2 * * 0'   # 每周日凌晨 2:00 (UTC)
  workflow_dispatch:       # 允许手动触发

jobs:
  refresh-caches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 刷新内容缓存（使用前缀匹配，获取最新）
      - name: Restore latest content cache
        uses: actions/cache/restore@v4
        with:
          path: src/generated/cache
          key: ${{ runner.os }}-content-cache-dummy
          restore-keys: |
            ${{ runner.os }}-content-cache-

      # 2. 刷新 npm 依赖缓存（使用固定键，该键基于 package-lock.json 哈希）
      - name: Restore npm dependencies cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.npm
          key: node-cache-Linux-x64-npm-187d5ebee4fc8d6f58cd460df5d8016e3a59081239cf7ea470fcf1a0365ba919
          restore-keys: |
            node-cache-Linux-x64-npm-
