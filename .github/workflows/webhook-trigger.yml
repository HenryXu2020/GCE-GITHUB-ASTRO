name: Handle Strapi Webhook

on:
  repository_dispatch:
    types: [strapi_batch, strapi_trigger-test]
  workflow_dispatch:   # 手动触发（用于测试全量构建）

concurrency:
  group: astro-build
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUBLIC_STRAPI_API_URL: ${{ secrets.STRAPI_API_URL }}
  PUBLIC_STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
  CI_STRAPI_INTROSPECTION_TOKEN: ${{ secrets.CI_STRAPI_INTROSPECTION_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------
      # 缓存恢复：使用动态键 + 前缀匹配，获取最近一次保存的缓存
      # -----------------------------------------------------------------
      - name: Restore content cache
        uses: actions/cache/restore@v4
        with:
          path: src/generated/cache
          key: ${{ runner.os }}-content-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-content-cache-

      # -----------------------------------------------------------------
      # 增量更新路径（仅用于 repository_dispatch 事件）
      # -----------------------------------------------------------------
      - name: Generate i18n config for incremental updates
        if: github.event_name == 'repository_dispatch'
        run: npm run generate-config

      - name: Process incremental updates
        if: github.event_name == 'repository_dispatch'
        env:
          EVENTS: ${{ toJSON(github.event.client_payload.events) }}
        run: |
          echo "Processing incremental updates..."
          # 解析 events 数组并逐个调用 update-cache-entry.ts
          echo "$EVENTS" | jq -c '.[]' | while read -r event; do
            MODEL=$(echo "$event" | jq -r '.model')
            ID=$(echo "$event" | jq -r '.id')
            ACTION=$(echo "$event" | jq -r '.action')
            LOCALES=$(echo "$event" | jq -r '.locales[]?')
            if [ -z "$LOCALES" ]; then
              echo "Updating $MODEL/$ID ($ACTION) with default locale"
              npx tsx scripts/update-cache-entry.ts \
                --model "$MODEL" \
                --id "$ID" \
                --event "$ACTION"
            else
              for LOCALE in $LOCALES; do
                echo "Updating $MODEL/$ID ($ACTION) locale=$LOCALE"
                npx tsx scripts/update-cache-entry.ts \
                  --model "$MODEL" \
                  --id "$ID" \
                  --locale "$LOCALE" \
                  --event "$ACTION"
              done
            fi
          done
          echo "Incremental updates completed."

      # -----------------------------------------------------------------
      # 保存更新后的缓存：使用动态键（含 run_id），避免键冲突
      # -----------------------------------------------------------------
      - name: Save updated cache
        if: github.event_name == 'repository_dispatch'
        uses: actions/cache/save@v4
        with:
          path: src/generated/cache
          key: ${{ runner.os }}-content-cache-${{ github.run_id }}

      # -----------------------------------------------------------------
      # 全量构建路径（用于非 repository_dispatch 事件）
      # -----------------------------------------------------------------
      - name: Full cache build (non-webhook)
        if: github.event_name != 'repository_dispatch'
        run: |
          echo "Running full cache build..."
          npm run analyze-schema
          npm run generate-correct-queries
          npm run codegen-dynamic
          npm run generate-config
          npm run build-cache

      # -----------------------------------------------------------------
      # 公共步骤：GraphQL 类型生成与站点构建
      # -----------------------------------------------------------------
      - name: Test Strapi GraphQL connectivity
        run: |
          echo "Testing GraphQL endpoint connectivity with Bearer token..."
          curl -X POST ${{ secrets.STRAPI_API_URL }}/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.STRAPI_API_TOKEN }}" \
            -H "apollo-require-preflight: true" \
            -H "x-ci-introspection-token: ${{ secrets.CI_STRAPI_INTROSPECTION_TOKEN }}" \
            -d '{"query": "query { __typename }"}' \
            -w "\nHTTP Status: %{http_code}\n"
          echo "Connectivity test completed."

      - name: Generate GraphQL queries
        run: npm run generate-correct-queries

      - name: Generate TypeScript types (codegen)
        id: codegen
        continue-on-error: true
        run: npm run codegen-dynamic

      - name: Verify codegen output
        run: |
          echo "Codegen exit code/outcome: ${{ steps.codegen.outcome }}"
          if [ -f src/generated/graphql-types.ts ]; then
            echo "✅ graphql-types.ts exists"
            ls -la src/generated/graphql-types.ts
            head -n 5 src/generated/graphql-types.ts
          else
            echo "❌ graphql-types.ts not found"
            exit 1
          fi

      - name: Generate i18n configuration
        run: npm run generate-config

      # -----------------------------------------------------------------
      # 构建 Astro 站点（区分 webhook 与其它事件）
      # -----------------------------------------------------------------
      - name: Build Astro site
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "Using incremental cache, skipping full cache build..."
            npx astro build
          else
            echo "Running full build with cache regeneration..."
            npm run build
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
