
query GetBlogList(
  $locale: I18NLocaleCode,
  $pagination: PaginationArg,
  $sort: [String]
) {
  blogs(
    locale: $locale,
    pagination: $pagination,
    sort: $sort
  ) {
        documentId
        title
        content
        author
        slug
        createdAt
        updatedAt
        publishedAt
        locale

        cover {
        documentId
        name
        alternativeText
        caption
        focalPoint
        width
        height
        formats
        hash
        ext
        mime
        size
        url
        previewUrl
        provider
        provider_metadata
        createdAt
        updatedAt
        publishedAt
        }


        localizations {
          documentId
          locale
          slug
          title
        }
  }
}

