name: Handle Strapi Webhook

on:
  repository_dispatch:
    types: [strapi_batch, strapi_trigger-test]
  workflow_dispatch:   # 手动触发（用于测试全量构建）

concurrency:
  group: astro-build
  cancel-in-progress: false

env:
  # NODE_VERSION 已移除，改用 actions/setup-node 直接锁定版本
  PUBLIC_STRAPI_API_URL: ${{ secrets.STRAPI_API_URL }}
  PUBLIC_STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
  CI_STRAPI_INTROSPECTION_TOKEN: ${{ secrets.CI_STRAPI_INTROSPECTION_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write

    steps:
      - uses: actions/checkout@v4

      # 显式锁定 Node.js 版本为 LTS 22.14.0，避免运行器默认升级到 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure jq is available
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          jq --version

      # -----------------------------------------------------------------
      # 生成缓存键组件（分支名 + 内容哈希），并输出 remote_hash 供复用
      # -----------------------------------------------------------------
      - name: Generate cache key components
        id: cache-key
        run: |
          # 分支名标准化（替换 / 为 -），并提供兜底值
          CACHE_BRANCH="${GITHUB_REF_NAME//\//-}"
          if [ -z "$CACHE_BRANCH" ]; then
            echo "::warning::GITHUB_REF_NAME is empty, using 'main' as fallback"
            CACHE_BRANCH="main"
          fi
          echo "CACHE_BRANCH=$CACHE_BRANCH" >> $GITHUB_ENV
          echo "::debug::CACHE_BRANCH=$CACHE_BRANCH"

          # 计算远程 schema 哈希（使用 introspection）
          echo "::group::Fetching remote schema hash"
          REMOTE_HASH=$(curl -s -f -X POST "${{ secrets.STRAPI_API_URL }}/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.STRAPI_API_TOKEN }}" \
            -d '{"query": "query IntrospectionQuery { __schema { types { name } } }"}' \
            2>/dev/null | jq -r '.data.__schema.types[].name' 2>/dev/null | sort | md5sum | cut -d' ' -f1 || echo "fetch_failed")
          echo "::endgroup::"

          if [ "$REMOTE_HASH" != "fetch_failed" ] && [ -n "$REMOTE_HASH" ]; then
            echo "CACHE_HASH=$REMOTE_HASH" >> $GITHUB_ENV
            echo "remote_hash=$REMOTE_HASH" >> $GITHUB_OUTPUT
            echo "$REMOTE_HASH" > src/generated/schema-hash.txt
            echo "::debug::Using remote schema hash: $REMOTE_HASH"
          else
            echo "::warning::Remote schema fetch failed, using fallback"
            # 降级：检查本地内容目录是否有文件
            if [ -d src/content ] && [ "$(find src/content -type f \( -name "*.md" -o -name "*.mdx" -o -name "*.json" \) 2>/dev/null | head -n1)" ]; then
              find src/content -type f \( -name "*.md" -o -name "*.mdx" -o -name "*.json" \) 2>/dev/null | sort | xargs md5sum 2>/dev/null | md5sum | cut -d' ' -f1 > fallback-hash.txt
              FALLBACK_HASH=$(cat fallback-hash.txt)
            else
              # 无内容文件时，使用固定标记 + 日期
              FALLBACK_HASH="no-content-$(date +%Y%m%d)"
              echo "$FALLBACK_HASH" > fallback-hash.txt
            fi
            echo "CACHE_HASH=$FALLBACK_HASH" >> $GITHUB_ENV
            echo "remote_hash=$FALLBACK_HASH" >> $GITHUB_OUTPUT
            echo "$FALLBACK_HASH" > src/generated/schema-hash.txt
            echo "::debug::Using fallback hash: $FALLBACK_HASH"
          fi

          # 输出最终缓存键以便调试
          FINAL_KEY="${{ runner.os }}-content-$CACHE_BRANCH-$CACHE_HASH"
          echo "::debug::Final cache key: $FINAL_KEY"
          echo "cache_key=$FINAL_KEY" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------
      # 缓存恢复（使用动态键 + 前缀匹配），同时缓存 schema-hash.txt
      # -----------------------------------------------------------------
      - name: Restore content cache
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: |
            src/generated/cache
            src/generated/schema-hash.txt
          key: ${{ steps.cache-key.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-content-${{ env.CACHE_BRANCH }}-
            ${{ runner.os }}-content-

      # -----------------------------------------------------------------
      # 缓存有效性校验与初始化
      # -----------------------------------------------------------------
      - name: Validate cache and fallback
        run: |
          mkdir -p src/generated/cache
          # 检查缓存目录是否为空
          if [ ! -d src/generated/cache ] || [ -z "$(ls -A src/generated/cache 2>/dev/null)" ]; then
            echo "::warning::Cache directory is empty, will fallback to full build"
            echo "FORCE_FULL_CACHE=true" >> $GITHUB_ENV
          elif [ ! -f src/generated/cache/MANIFEST.json ]; then
            echo "::warning::Cache manifest missing, will fallback to full build"
            echo "FORCE_FULL_CACHE=true" >> $GITHUB_ENV
          elif ! jq -e '.version' src/generated/cache/MANIFEST.json > /dev/null 2>&1; then
            echo "::warning::Cache manifest invalid, will fallback to full build"
            echo "FORCE_FULL_CACHE=true" >> $GITHUB_ENV
          fi

      # -----------------------------------------------------------------
      # 🔑 关键修复：提前生成 i18n 配置，供后续 update-cache-entry.ts 使用
      # -----------------------------------------------------------------
      - name: Generate i18n configuration (early)
        run: npm run generate-config

      # -----------------------------------------------------------------
      # 增量更新路径（仅用于 repository_dispatch 事件且缓存有效）
      # 使用进程替换避免子 shell 错误传播问题
      # -----------------------------------------------------------------
      - name: Process incremental updates
        if: github.event_name == 'repository_dispatch' && env.FORCE_FULL_CACHE != 'true'
        env:
          EVENTS: ${{ toJSON(github.event.client_payload.events) }}
        run: |
          set -euo pipefail

          echo "Processing incremental updates..."
          FAILED=0

          # 使用进程替换，确保 while 循环在主 shell 中执行
          while IFS= read -r event; do
            MODEL=$(echo "$event" | jq -r '.model')
            ID=$(echo "$event" | jq -r '.id')
            ACTION=$(echo "$event" | jq -r '.action')
            
            # 参数校验
            if ! [[ "$MODEL" =~ ^[a-z][a-z0-9-]*$ ]]; then
              echo "::error::Invalid model name: $MODEL"
              FAILED=1
              continue
            fi
            if ! [[ "$ID" =~ ^[0-9a-f-]+$ ]]; then
              echo "::error::Invalid entry ID: $ID"
              FAILED=1
              continue
            fi
            if ! [[ "$ACTION" =~ ^(publish|unpublish|delete|update|create)$ ]]; then
              echo "::error::Invalid action: $ACTION"
              FAILED=1
              continue
            fi

            # 安全处理 locales：使用 while read 防止空格拆分
            LOCALE_COUNT=$(echo "$event" | jq -r '.locales | length // 0')
            if [ "$LOCALE_COUNT" -eq 0 ]; then
              echo "Updating $MODEL/$ID ($ACTION) with default locale"
              npx tsx scripts/update-cache-entry.ts \
                --model "$MODEL" \
                --id "$ID" \
                --event "$ACTION"
            else
              echo "$event" | jq -r '.locales[]' | while IFS= read -r LOCALE; do
                echo "Updating $MODEL/$ID ($ACTION) locale=$LOCALE"
                npx tsx scripts/update-cache-entry.ts \
                  --model "$MODEL" \
                  --id "$ID" \
                  --locale "$LOCALE" \
                  --event "$ACTION"
              done
            fi
          done < <(echo "$EVENTS" | jq -c '.[]')

          # 如果有任何校验失败，终止步骤
          [ "$FAILED" -eq 0 ] || exit 1
          echo "Incremental updates completed."

          # 增量更新成功后，更新缓存 manifest 中的最后更新时间
          if [ -f src/generated/cache/MANIFEST.json ]; then
            jq --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '.lastUpdated = $ts' \
              src/generated/cache/MANIFEST.json > /tmp/manifest.tmp && \
              mv /tmp/manifest.tmp src/generated/cache/MANIFEST.json
          fi

      # -----------------------------------------------------------------
      # 全量构建路径（用于非 repository_dispatch 事件或缓存无效时）
      # -----------------------------------------------------------------
      - name: Full cache build (non-webhook or fallback)
        if: github.event_name != 'repository_dispatch' || env.FORCE_FULL_CACHE == 'true'
        run: |
          echo "Running full cache build..."
          npm run analyze-schema
          npm run generate-correct-queries
          npm run codegen-dynamic
          npm run generate-config   # 已生成，但再执行一次也无妨
          npm run build-cache
          # 生成缓存清单文件
          echo '{"version":1}' > src/generated/cache/MANIFEST.json

      # -----------------------------------------------------------------
      # 公共步骤：GraphQL 连通性测试
      # -----------------------------------------------------------------
      - name: Test Strapi GraphQL connectivity
        env:
          STRAPI_URL: ${{ secrets.STRAPI_API_URL }}
          STRAPI_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
        run: |
          set +x
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $STRAPI_TOKEN" \
            "$STRAPI_URL/graphql" \
            -d '{"query":"{__typename}"}')
          echo "GraphQL endpoint status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Strapi GraphQL connectivity failed"
            exit 1
          fi

      # -----------------------------------------------------------------
      # 生成 GraphQL 查询和 TypeScript 类型（智能合并，避免冗余）
      # -----------------------------------------------------------------
      - name: Generate GraphQL queries and types
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ "${{ env.FORCE_FULL_CACHE }}" != "true" ]; then
            REMOTE_HASH="${{ steps.cache-key.outputs.remote_hash }}"
            LOCAL_HASH=$(cat src/generated/schema-hash.txt 2>/dev/null || echo "none")
            if [ -n "$REMOTE_HASH" ] && [ "$REMOTE_HASH" != "$LOCAL_HASH" ]; then
              echo "Schema changed ($LOCAL_HASH → $REMOTE_HASH), regenerating queries and types"
              npm run generate-correct-queries
              npm run codegen-dynamic
              echo "$REMOTE_HASH" > src/generated/schema-hash.txt
            else
              echo "Schema unchanged, skipping query regeneration"
            fi
          else
            echo "Full build path, regenerating queries and types"
            npm run generate-correct-queries
            npm run codegen-dynamic
          fi

      - name: Verify codegen output
        run: |
          if [ ! -s src/generated/graphql-types.ts ]; then
            echo "::error::graphql-types.ts is missing or empty"
            exit 1
          fi
          if ! grep -qE "export (type|interface) (Query|Mutation|.*Entry)" src/generated/graphql-types.ts; then
            echo "::warning::graphql-types.ts may lack expected exports (manual verification recommended)"
          fi
          echo "✅ Codegen output verified"

      # -----------------------------------------------------------------
      # 构建 Astro 站点
      # -----------------------------------------------------------------
      - name: Build Astro site
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "Using incremental cache, skipping full cache build..."
            npx astro build
          else
            echo "Running full build with cache regeneration..."
            npm run build
          fi

      - name: Verify build output
        run: |
          if [ ! -d dist ]; then
            echo "::error::Build output directory 'dist' not found"
            exit 1
          fi
          if [ ! -f dist/index.html ]; then
            echo "::error::Missing dist/index.html"
            exit 1
          fi
          if find dist -name "*.js" -exec grep -l "undefined\|null is not an object" {} \; | grep -q .; then
            echo "::warning::Build output may contain runtime errors"
          fi

      # -----------------------------------------------------------------
      # 保存更新后的缓存（仅在构建成功后执行，并容忍 key 冲突）
      # -----------------------------------------------------------------
      - name: Save content cache (post-build)
        if: success()
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: |
            src/generated/cache
            src/generated/schema-hash.txt
          key: ${{ steps.cache-key.outputs.cache_key }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
